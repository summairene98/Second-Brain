<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Clienti — Farmacista Digitale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sauce', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 50px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #9d8bb3;
            font-size: 1.1em;
            font-weight: 300;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(107, 76, 154, 0.1);
            border: 1px solid #6B4C9A;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #d8a4ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #9d8bb3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid #6B4C9A;
            background: rgba(107, 76, 154, 0.2);
            color: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            background: #6B4C9A;
            box-shadow: 0 0 20px rgba(107, 76, 154, 0.4);
        }

        .btn.active {
            background: #6B4C9A;
            box-shadow: 0 0 20px rgba(107, 76, 154, 0.5);
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .client-card {
            background: rgba(107, 76, 154, 0.08);
            border: 1px solid rgba(107, 76, 154, 0.3);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .client-card:hover {
            border-color: #6B4C9A;
            box-shadow: 0 8px 32px rgba(107, 76, 154, 0.2);
            transform: translateY(-5px);
        }

        .client-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6B4C9A, #d8a4ff);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .client-card:hover::before {
            opacity: 1;
        }

        .client-name {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .client-goal {
            font-size: 0.95em;
            color: #9d8bb3;
            margin-bottom: 20px;
            line-height: 1.5;
            font-style: italic;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .progress-label-left {
            color: #d8a4ff;
            font-weight: 600;
        }

        .progress-label-right {
            color: #9d8bb3;
            font-size: 0.9em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(107, 76, 154, 0.2);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(107, 76, 154, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6B4C9A, #d8a4ff);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 15px rgba(107, 76, 154, 0.5);
        }

        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
        }

        .status.active {
            background: rgba(107, 76, 154, 0.3);
            color: #d8a4ff;
            border: 1px solid #6B4C9A;
        }

        .status.completed {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 1px solid #4caf50;
        }

        footer {
            text-align: center;
            color: #9d8bb3;
            font-size: 0.9em;
            padding-top: 30px;
            border-top: 1px solid rgba(107, 76, 154, 0.2);
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .clients-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 Farmacista Digitale</h1>
            <p class="subtitle">Dashboard Clienti — Protocollo F.A.R.M.A.</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalClients">10</div>
                <div class="stat-label">Clienti Attivi</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSessions">46</div>
                <div class="stat-label">Sessioni Completate</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgProgress">38%</div>
                <div class="stat-label">Progress Medio</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Protocolli Completati</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn active" onclick="filterClients('all')">Tutti</button>
            <button class="btn" onclick="filterClients('active')">In Corso</button>
            <button class="btn" onclick="filterClients('completed')">Completati</button>
            <button class="btn" onclick="sortClients('progress')">Più Avanzati</button>
        </div>

        <div class="clients-grid" id="clientsGrid"></div>

        <footer>
            Ultimo aggiornamento: <span id="lastUpdate">-</span><br>
            Prossimo sync: Ogni lunedì alle 8:00 AM
        </footer>
    </div>

    <script>
        const clientsData = [
            { nome: "Egidio Bertolucci", sessioni: 6, obiettivo: "Educazione nutrizionale integrata — Supportare pazienti in terapia con Mounjaro/Ozempic" },
            { nome: "Kirandeep", sessioni: 5, obiettivo: "Dermocosmesi scientifica — Specializzata in problemi di pelle con risultati visibili in 90 giorni" },
            { nome: "Andrea Cametti", sessioni: 4, obiettivo: "Sleep optimization e coerenza cardiaca — Regolazione del sistema nervoso" },
            { nome: "Pasqua", sessioni: 4, obiettivo: "Microbiota friendly — Routine di cura per donne in premenopausa" },
            { nome: "Cinzia Lacovara", sessioni: 4, obiettivo: "Dermocosmetica — Asse intestino-pelle per giovani adulte con acne" },
            { nome: "Monica Crabuzza", sessioni: 3, obiettivo: "Consulenza nutrizionale online — Riduzione circonferenza girovita per donne 45-55 anni" },
            { nome: "Sandra", sessioni: 2, obiettivo: "Cura della pelle scientifica — Donne 25-40 anni con competenze ormonali" },
            { nome: "Beatrice", sessioni: 2, obiettivo: "Consulenza specializzata — Superando perfezionismo e blocchi personali" },
            { nome: "Camilla Taddei", sessioni: 1, obiettivo: "Farmacista digitale — Benessere attraverso personal brand scientifico" },
            { nome: "Giulia", sessioni: 1, obiettivo: "In definizione" }
        ];

        let filteredClients = [...clientsData];
        const totalSessions = clientsData.reduce((sum, c) => sum + c.sessioni, 0);
        const avgProgress = Math.round((totalSessions / (clientsData.length * 12)) * 100);
        const completedCount = clientsData.filter(c => c.sessioni === 12).length;

        document.getElementById('totalSessions').textContent = totalSessions;
        document.getElementById('avgProgress').textContent = avgProgress + '%';
        document.getElementById('completedCount').textContent = completedCount;
        document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('it-IT', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        function renderClients(clients) {
            const grid = document.getElementById('clientsGrid');
            grid.innerHTML = '';

            clients.forEach(client => {
                const progress = (client.sessioni / 12) * 100;
                const status = client.sessioni === 12 ? 'completed' : 'active';
                const statusText = client.sessioni === 12 ? 'Completato' : 'In Corso';

                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerHTML = `
                    <div class="client-name">${client.nome}</div>
                    <div class="client-goal">${client.obiettivo}</div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span class="progress-label-left">Protocollo F.A.R.M.A.</span>
                            <span class="progress-label-right">${client.sessioni}/12 sessioni</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <span class="status ${status}">${statusText}</span>
                `;
                grid.appendChild(card);
            });
        }

        function filterClients(filter) {
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (filter === 'all') {
                filteredClients = [...clientsData];
            } else if (filter === 'active') {
                filteredClients = clientsData.filter(c => c.sessioni < 12);
            } else if (filter === 'completed') {
                filteredClients = clientsData.filter(c => c.sessioni === 12);
            }

            renderClients(filteredClients);
        }

        function sortClients(sortBy) {
            document.querySelectorAll('.controls .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (sortBy === 'progress') {
                filteredClients.sort((a, b) => b.sessioni - a.sessioni);
            }

            renderClients(filteredClients);
        }

        // Render initial
        renderClients(filteredClients);
    </script>
</body>
</html>
